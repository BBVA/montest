name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Verify dev environment
        run: nix develop --command bash -c "uv --version && python3.11 --version"

      - name: Sync dependencies
        run: nix develop --command bash -c "uv sync --extra dev"

      - name: Check linter
        run: nix develop --command bash -c "uv run ruff check src tests"

      - name: Check types
        run: nix develop --command bash -c "uv run mypy src"

      - name: Run tests
        run: nix develop --command bash -c "uv run pytest"
